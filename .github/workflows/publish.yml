name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "poetry.lock"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Set version
        id: version
        run: |
          DATE_PART=$(date -u +%Y.%-m.%-d)
          LAST=$(git tag --list "v${DATE_PART}.*" --sort=-v:refname | head -n1)
          if [ -z "$LAST" ]; then
            REV=1
          else
            REV=$(( ${LAST##*.} + 1 ))
          fi
          VERSION="${DATE_PART}.${REV}"
          poetry version "${VERSION}"
          git tag "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: poetry build

      - name: Publish to PyPI
        run: poetry publish --username __token__ --password "${{ secrets.PYPI_TOKEN }}"

      - name: Push tag
        run: git push origin "v$(poetry version -s)"

      - name: Upload sdist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: dist/ozm-*.tar.gz

  update-formula:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sdist
          path: dist

      - name: Compute SHA and fetch PyPI URL
        id: meta
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          SHA256=$(sha256sum "dist/ozm-${VERSION}.tar.gz" | cut -d' ' -f1)

          for i in 1 2 3 4 5; do
            URL=$(curl -sf "https://pypi.org/pypi/ozm/${VERSION}/json" \
              | python -c "
          import sys, json
          files = json.load(sys.stdin)['urls']
          print(next(f['url'] for f in files if f['filename'].endswith('.tar.gz')))" 2>/dev/null) \
              && break
            sleep 15
          done

          if [ -z "$URL" ]; then
            echo "::error::Could not fetch sdist URL from PyPI"
            exit 1
          fi

          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          python scripts/update_formula.py \
            Formula/ozm.rb \
            "${{ steps.meta.outputs.url }}" \
            "${{ steps.meta.outputs.sha256 }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ozm.rb
          git diff --cached --quiet || {
            git commit -m "Update formula to ${{ needs.publish.outputs.version }} [skip ci]"
            git push origin main
          }
